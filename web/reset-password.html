<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Resetear Contraseña - ConVive</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #E91E8C 0%, #D81B84 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #E91E8C;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 { color: #111; margin: 0 0 10px; }
        p { color: #666; margin: 0; }
        .error { color: #e74c3c; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Un momento...</h1>
        <p>Abriendo la app para cambiar tu contraseña</p>
        <div id="error" style="display: none;" class="error">
            <p>Si la app no abre automáticamente, <a href="#" id="fallback">haz clic aquí</a></p>
        </div>
    </div>

    <script>
        // Extraer parámetros de la URL
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const type = params.get('type') || 'recovery';
        const email = params.get('email') || '';

        console.log('🌐 URL actual:', window.location.href);
        console.log('📦 Parámetros recibidos:');
        console.log('  - code:', code);
        console.log('  - type:', type);
        console.log('  - email:', email);

        // Construir el deep link
        let deepLink = 'com.example.convive://reset-password';
        
        if (code) {
            deepLink += `?code=${encodeURIComponent(code)}&type=${type}`;
            if (email) deepLink += `&email=${encodeURIComponent(email)}`;
        }

        console.log('📱 Deep Link a abrir:', deepLink);
        
        // Actualizar el link de fallback
        const fallbackLink = document.getElementById('fallback');
        fallbackLink.href = deepLink;
        fallbackLink.textContent = 'Abre la app aquí';

        // Intentar abrir el deep link inmediatamente
        console.log('🚀 Intentando abrir deep link...');
        window.location.href = deepLink;

        // Si no abre en 3 segundos, mostrar mensaje
        let timerStarted = false;
        window.addEventListener('blur', () => {
            console.log('✅ App abierta (window blur detectado)');
            timerStarted = true;
        });

        setTimeout(() => {
            if (!timerStarted && !document.hidden) {
                console.log('⚠️ Deep link no se abrió. Mostrando fallback.');
                document.getElementById('error').style.display = 'block';
            }
        }, 3000);
    </script>
</body>
</html>
