<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Restablecer Contraseña - ConVive</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #E91E8C 0%, #D81B84 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 90%;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #E91E8C;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 { color: #111; margin: 0 0 10px; font-size: 22px; }
        p { color: #666; margin: 0 0 8px; font-size: 14px; line-height: 1.5; }
        .error { color: #e74c3c; margin-top: 20px; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #E91E8C, #D81B84);
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <h1 id="title">Un momento...</h1>
        <p id="subtitle">Verificando tu enlace de recuperación</p>
        <div id="error" style="display: none;" class="error">
            <p>Si la página no carga automáticamente, haz clic aquí:</p>
            <a href="#" id="fallback" class="btn">Continuar</a>
        </div>
    </div>

    <script>
        // ===================================================
        // EXTRAER PARÁMETROS DE LA URL
        // Supabase envía: /reset-password?code=XXX&type=recovery
        // ===================================================
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const type = params.get('type') || 'recovery';
        const email = params.get('email') || '';

        console.log('🌐 URL actual:', window.location.href);
        console.log('📦 Parámetros recibidos:');
        console.log('  - code:', code);
        console.log('  - type:', type);
        console.log('  - email:', email);

        // ===================================================
        // DETECTAR SI ES MOBILE O WEB
        // ===================================================
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        if (code) {
            if (isMobile) {
                // ----- MOBILE: Intentar abrir la app nativa -----
                const deepLink = `com.example.convive://reset-password?code=${encodeURIComponent(code)}&type=${type}${email ? '&email=' + encodeURIComponent(email) : ''}`;
                console.log('📱 Mobile detectado. Deep link:', deepLink);

                document.getElementById('subtitle').textContent = 'Abriendo la app...';
                document.getElementById('fallback').href = deepLink;
                document.getElementById('fallback').textContent = 'Abrir app manualmente';

                window.location.href = deepLink;

                // Si en 3 segundos no se abrió, mostrar botón
                setTimeout(() => {
                    document.getElementById('spinner').style.display = 'none';
                    document.getElementById('title').textContent = '¿No se abrió la app?';
                    document.getElementById('error').style.display = 'block';
                }, 3000);

            } else {
                // ----- WEB: Redirigir al Flutter Web App directamente -----
                // Flutter Web usa hash routing (#), así que la URL destino es:
                // https://convive-app-6debf.web.app/#/reset-password?code=XXX&type=recovery
                let flutterUrl = `${window.location.origin}/#/reset-password?code=${encodeURIComponent(code)}&type=${type}`;
                if (email) flutterUrl += `&email=${encodeURIComponent(email)}`;

                console.log('🌐 Web detectado. Redirigiendo a Flutter Web:', flutterUrl);
                document.getElementById('subtitle').textContent = 'Cargando formulario...';

                // Redirigir inmediatamente al router de Flutter Web
                window.location.replace(flutterUrl);
            }
        } else {
            // No hay code en la URL — mostrar error
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('title').textContent = '❌ Enlace inválido';
            document.getElementById('subtitle').textContent = 'Este enlace de recuperación no es válido o ya fue usado.';
            document.getElementById('error').style.display = 'block';
            document.getElementById('fallback').href = `${window.location.origin}/#/forgot-password`;
            document.getElementById('fallback').textContent = 'Solicitar nuevo enlace';
            console.warn('⚠️ No se encontró "code" en la URL.');
        }
    </script>
</body>
</html>
