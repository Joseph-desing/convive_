<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConVive - Verificación de Email</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FFF1F7 0%, #FFFFFF 100%);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px;
        }
        .card {
            background: white; border-radius: 24px; padding: 40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08); text-align: center;
            max-width: 400px; width: 100%;
        }
        .icon { font-size: 48px; margin-bottom: 16px; }
        h1 { font-size: 22px; color: #1F2937; margin-bottom: 8px; }
        p { font-size: 14px; color: #6B7280; margin-bottom: 24px; line-height: 1.6; }
        .btn {
            display: inline-block; background: linear-gradient(135deg, #E91E8C, #D81B84);
            color: white; padding: 14px 40px; border-radius: 12px;
            text-decoration: none; font-weight: 600; font-size: 16px;
            border: none; cursor: pointer;
        }
        .spinner { margin: 20px auto; width: 40px; height: 40px;
            border: 4px solid #f3f3f3; border-top: 4px solid #E91E8C;
            border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success { color: #16A34A; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div id="loading">
            <div class="icon">📧</div>
            <h1>Email verificado</h1>
            <p>Redirigiendo...</p>
            <div class="spinner"></div>
        </div>
        <div id="success" class="hidden">
            <div class="icon">✅</div>
            <h1 class="success">¡Email verificado!</h1>
            <p>Tu correo ha sido confirmado exitosamente.</p>
            <a id="openAppBtn" href="#" class="btn">Abrir ConVive</a>
            <p style="margin-top: 16px; font-size: 12px; color: #9CA3AF;">
                Si la app no se abre automáticamente, presiona el botón.
            </p>
        </div>
    </div>

    <script>
        (function() {
            var search = window.location.search;   // ?code=xxx&type=signup
            var hash   = window.location.hash;     // #access_token=xxx... (implicit flow)
            var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

            console.log('📧 [auth-callback] search:', search);
            console.log('📧 [auth-callback] hash:',   hash);
            console.log('📧 [auth-callback] isMobile:', isMobile);

            // ── Fusionar hash params como query params ──────────────────────
            // Supabase a veces envía access_token/refresh_token en el hash (#).
            // Los intent URIs de Android usan # para la sintaxis #Intent;...
            // así que convertimos el hash a parámetros ?query para pasarlos a la app.
            var params = search;
            if (hash && hash.length > 1 && !hash.startsWith('#Intent')) {
                var hashContent = hash.substring(1); // Quitar el #
                if (hashContent.length > 0) {
                    params = params.length > 0
                        ? params + '&' + hashContent
                        : '?' + hashContent;
                }
            }

            // ── Detectar error_code en los parámetros ───────────────────────
            var urlParams = new URLSearchParams(params.replace(/^\?/, ''));
            var errorCode = urlParams.get('error_code') || '';
            var isOtpExpired = errorCode === 'otp_expired' || errorCode === 'otp_disabled';

            console.log('📧 [auth-callback] params finales:', params);
            console.log('📧 [auth-callback] errorCode:', errorCode);

            if (isMobile) {
                // ✅ Si el OTP expiró (email ya verificado en web) → abrir app en email-confirmed
                // ✅ Si hay código válido → pasar a la app para que intercambie la sesión
                var intentUrl;
                if (isOtpExpired) {
                    // Email ya estaba verificado — simplemente llevar al login
                    console.log('📧 [auth-callback] OTP expirado = email ya confirmado → /email-confirmed');
                    intentUrl = 'intent://email-confirmed' +
                        '#Intent;scheme=com.convive.app;package=com.convive.app;end';
                } else {
                    intentUrl = 'intent://auth-callback' + params +
                        '#Intent;scheme=com.convive.app;package=com.convive.app;end';
                }

                console.log('📧 [auth-callback] Intent URL:', intentUrl);

                // Mostrar pantalla de éxito 1.5 s y luego abrir la app
                setTimeout(function() {
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('success').classList.remove('hidden');
                    document.getElementById('openAppBtn').href = intentUrl;

                    // Intentar abrir la app automáticamente
                    window.location.href = intentUrl;
                }, 1500);

            } else {
                // En web: redirigir a la app Flutter (hash route)
                var flutterUrl = '/#/email-confirmed' + search;
                console.log('📧 [auth-callback] Redirigiendo a Flutter:', flutterUrl);
                window.location.href = flutterUrl;
            }
        })();
    </script>
</body>
</html>
