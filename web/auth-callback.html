<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConVive - Verificación de Email</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FFF1F7 0%, #FFFFFF 100%);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px;
        }
        .card {
            background: white; border-radius: 24px; padding: 40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08); text-align: center;
            max-width: 400px; width: 100%;
        }
        .icon { font-size: 48px; margin-bottom: 16px; }
        h1 { font-size: 22px; color: #1F2937; margin-bottom: 8px; }
        p { font-size: 14px; color: #6B7280; margin-bottom: 24px; line-height: 1.6; }
        .btn {
            display: inline-block; background: linear-gradient(135deg, #E91E8C, #D81B84);
            color: white; padding: 14px 40px; border-radius: 12px;
            text-decoration: none; font-weight: 600; font-size: 16px;
            border: none; cursor: pointer;
        }
        .spinner { margin: 20px auto; width: 40px; height: 40px;
            border: 4px solid #f3f3f3; border-top: 4px solid #E91E8C;
            border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success { color: #16A34A; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div id="loading">
            <div class="icon">📧</div>
            <h1>Email verificado</h1>
            <p>Redirigiendo...</p>
            <div class="spinner"></div>
        </div>
        <div id="success" class="hidden">
            <div class="icon">✅</div>
            <h1 class="success">¡Email verificado!</h1>
            <p>Tu correo ha sido confirmado exitosamente.</p>
            <a id="openAppBtn" href="#" class="btn">Abrir ConVive</a>
            <p style="margin-top: 16px; font-size: 12px; color: #9CA3AF;">
                Si la app no se abre automáticamente, presiona el botón.
            </p>
        </div>
    </div>

    <script>
        (function() {
            var params = window.location.search;
            var hash = window.location.hash;
            var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

            console.log('📧 [auth-callback] params:', params);
            console.log('📧 [auth-callback] isMobile:', isMobile);

            if (isMobile) {
                // En móvil: intentar abrir el APK con intent deep link
                var deepLink = 'com.example.convive_://auth-callback' + params;
                var intentUrl = 'intent://auth-callback' + params +
                    '#Intent;scheme=com.example.convive_;package=com.example.convive;end';

                console.log('📧 [auth-callback] Intentando deep link:', deepLink);
                console.log('📧 [auth-callback] Intent URL:', intentUrl);

                // Mostrar éxito después de un delay
                setTimeout(function() {
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('success').classList.remove('hidden');
                    document.getElementById('openAppBtn').href = intentUrl;
                }, 1500);

                // Intentar abrir con intent primero (más confiable en Android)
                window.location.href = intentUrl;
            } else {
                // En web: redirigir a la app Flutter
                var flutterUrl = '/#/email-confirmed' + params;
                console.log('📧 [auth-callback] Redirigiendo a Flutter:', flutterUrl);
                window.location.href = flutterUrl;
            }
        })();
    </script>
</body>
</html>
